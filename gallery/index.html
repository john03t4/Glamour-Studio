    <!-- Video Modal -->
    <div id="video-modal" class="modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <iframe id="modal-iframe" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function openModal(url) {
            document.getElementById('modal-iframe').src = url;
            document.getElementById('video-modal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('video-modal').style.display = 'none';
            document.getElementById('modal-iframe').src = ''; // Stop video
        }
        // Close modal if clicked outside content
        window.onclick = function(event) {
            if (event.target == document.getElementById('video-modal')) {
                closeModal();
            }
        }
    </script>
